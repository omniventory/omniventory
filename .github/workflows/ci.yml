name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    name: Backend (ruff · mypy · pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.8"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint — ruff check
        run: uv run ruff check .

      - name: Lint — ruff format --check
        run: uv run ruff format --check .

      - name: Type-check — mypy
        run: uv run mypy app

      - name: Test — pytest
        run: uv run pytest

  frontend:
    name: Frontend (eslint · tsc · vitest · vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm via corepack
        run: corepack enable pnpm

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint — eslint
        run: pnpm lint

      - name: Type-check — tsc
        run: pnpm typecheck

      - name: Test — vitest
        run: pnpm test

      - name: Build — vite
        run: pnpm build

  contract:
    name: Contract (no-drift gate)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.8"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python
        run: uv python install 3.13
        working-directory: backend

      - name: Install backend dependencies
        run: uv sync --frozen
        working-directory: backend

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm via corepack
        run: corepack enable pnpm

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        working-directory: frontend

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Regenerate OpenAPI artifacts
        run: make codegen

      - name: Assert no drift
        run: git diff --exit-code openapi.json frontend/src/api/schema.d.ts

  docker:
    name: Docker (build + smoke test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -f docker/Dockerfile -t omniventory:ci .

      - name: Validate compose config
        # Ensures the compose files (incl. the migrate service + the app's
        # depends_on: service_completed_successfully gate) are valid.
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml config -q

      - name: Smoke test — run migration (one-shot), then start the app
        run: |
          # Migrations now run in their own one-shot container (mirroring the
          # compose `migrate` service); the entrypoint no longer migrates.
          # A shared named volume carries the migrated DB to the app container.
          # Named volumes inherit the image's /app/data ownership (uid 1000),
          # so the app user can write without bind-mount permission juggling.
          docker volume create omniventory-ci-data

          # Fail-closed: if migration exits non-zero this step fails and the
          # app is never started.
          docker run --rm \
            -v omniventory-ci-data:/app/data \
            -e SECRET_KEY=ci-test-secret-key \
            -e DATABASE_URL=sqlite:////app/data/omniventory.db \
            omniventory:ci alembic upgrade head

          # Start the app against the already-migrated volume.
          docker run -d \
            --name omniventory-ci \
            -v omniventory-ci-data:/app/data \
            -p 8000:8000 \
            -e SECRET_KEY=ci-test-secret-key \
            -e ENVIRONMENT=production \
            -e DATABASE_URL=sqlite:////app/data/omniventory.db \
            omniventory:ci

          # Wait for the container to be healthy (up to 90 s)
          for i in $(seq 1 18); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' omniventory-ci 2>/dev/null || echo "starting")
            echo "Health status ($i/18): $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              break
            fi
            sleep 5
          done

          # /api/health must report db:ok ...
          docker exec omniventory-ci python -c "
          import urllib.request, json, sys
          body = json.loads(urllib.request.urlopen('http://127.0.0.1:8000/api/health').read())
          print('health:', body)
          sys.exit(0 if body.get('db') == 'ok' else 1)
          "
          # ... and setup-status must be true, proving the migrated tables exist.
          docker exec omniventory-ci python -c "
          import urllib.request, json, sys
          body = json.loads(urllib.request.urlopen('http://127.0.0.1:8000/api/auth/setup-status').read())
          print('setup-status:', body)
          sys.exit(0 if body.get('setup_required') is True else 1)
          "

      - name: Clean up
        if: always()
        run: |
          docker rm -f omniventory-ci || true
          docker volume rm omniventory-ci-data || true
          docker rmi omniventory:ci || true
