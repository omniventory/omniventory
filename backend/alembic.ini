# Alembic configuration file.
# The ``sqlalchemy.url`` key is intentionally left blank; env.py reads
# ``settings.database_url`` at runtime so we never hardcode a connection string
# here.  Both ``alembic upgrade head`` and CI use the env-var path.

[alembic]
# Path to migration scripts, relative to the location of this .ini file.
script_location = alembic

# Template used for new migration files.
file_template = %%(rev)s_%%(slug)s

# Timezone used when outputting timestamps in migration files.
timezone = UTC

# Max length for the "slug" part of the auto-generated filename.
truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command
# even if autogenerate is not used
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without a source .py file to be
# detected as revisions in the versions/ directory
# sourceless = false

# version location specification; This defaults
# to alembic/versions.  When using multiple version
# directories, initial revisions must be specified with --version-path.
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# the output encoding used when revision files
# are written from script.mako
# output_encoding = utf-8

# NOTE: sqlalchemy.url is intentionally omitted — env.py reads it from Settings.
# sqlalchemy.url =

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for further
# detail and examples

# format using "black" - use the console_scripts runner, against the "black" entrypoint
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# lint with attempts to fix using "ruff" - use the exec runner, execute a binary
# hooks = ruff
# ruff.type = exec
# ruff.executable = %(here)s/.venv/bin/ruff
# ruff.options = --fix REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
