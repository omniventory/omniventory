# Omniventory — Production compose file
# Uses a prebuilt image (no build step here).
# Run with:  docker compose up -d
# Dev override:  docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up -d --build

services:
  app:
    image: omniventory:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - omniventory_data:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request, sys; res = urllib.request.urlopen('http://127.0.0.1:8000/api/health'); sys.exit(0 if res.status == 200 else 1)"
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

volumes:
  omniventory_data:
    driver: local
